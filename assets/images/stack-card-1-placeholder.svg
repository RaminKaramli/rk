<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Stack Card 1 Placeholder</title>
  <desc id="desc">Placeholder image area for the first stack card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151821" />
      <stop offset="100%" stop-color="#0d0f13" />
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="28" fill="url(#bg)" />
  <rect x="60" y="60" width="1080" height="640" rx="24" fill="none" stroke="#2f3544" stroke-width="3" stroke-dasharray="14 10" />
  <g fill="#98a2bc" font-family="Montserrat, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="340" font-size="52" font-weight="600">Add Your Image</text>
    <text x="600" y="395" font-size="28" fill="#6f7891">Replace: assets/images/stack-card-1-placeholder.svg</text>
  </g>
</svg>
