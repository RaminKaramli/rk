<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RK Project</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css"
  />
  <link rel="stylesheet" href="./assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
  <script type="module" src="./assets/js/main.js"></script>
</head>

<body class="site-body">
  <div class="loading-overlay">
    <div class="loading-track">
      <div class="loading-bar"></div>
    </div>
  </div>

  <main class="main-content">
    <section id="home-section" class="hero-section">
      <div class="hero-top">
        <div class="top-left">
          <p data-key="frontend">
            FRONT-END DEVELOPER
          </p>
          <p data-key="uiux">
            UI/UX DESIGN
          </p>
        </div>
      </div>

      <div class="hero-middle">
        <p data-key="hearing" class="press-text-one">
          I use a hearing aid to hear
        </p>

        <div class="hero-name-wrap">
          <h1
            data-key="myname"
            class="my-name"
            style="font-family: var(--headingnowtrial); letter-spacing: 0.005em;"
            data-en="Ramin Karamli"
          >
            Ramin <span class="surname-black">KAR</span><span class="surname-filter">AMLI</span>
          </h1>

          <div class="hero-figure">
            <img src="./assets/images/svgviewer-png-output.png" alt="Person waving while working on a laptop"
              class="hero-figure-image" />
          </div>
        </div>

        <p data-key="build" class="press-text-two">
          I build websites using HTML, CSS, JavaScript, TypeScript, and React.js
        </p>
      </div>

      <div id="left-right-full" class="bottom-row">
        <div class="top-right">
          <span class="sosial-icons">
            <a href="https://www.linkedin.com/in/karamliramin/" target="_blank" class="social-link"><i
                class="fa-brands fa-linkedin"></i></a>
            <a href="https://github.com/RaminKaramli" target="_blank" class="social-link"><i
                class="fa-brands fa-github"></i></a>
            <a href="https://www.instagram.com/raminkaramli/" target="_blank" class="social-link"><i
                class="fa-brands fa-instagram"></i></a>
            <a href="https://x.com/raminkaramli" target="_blank" class="social-link"><i
                class="fa-brands fa-x-twitter"></i></a>
          </span>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
